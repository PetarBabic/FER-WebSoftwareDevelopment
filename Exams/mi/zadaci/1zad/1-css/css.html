<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>1. CSS</title>
        <style>
            @font-face {
                font-family:"Roboto-Regular";
                src: local("Roboto-Regular"),
                url("Roboto-Regular.ttf")
            }

            * {
                font-family:"Roboto-Regular";
            }
            .card{
                width: 400px;
                background-color: seashell;

                border-radius: 20px;
            }

            .card-actions {
                display: flex;

                justify-content: center;
            }

            .card-actions > button{
                background-color: lightskyblue;
                border: none;

                margin: 5px;
                padding: 10px;

                margin-top: 2rem;
                margin-bottom: 2rem;

                border-radius: 5px;

                border: solid black;

                font-size: medium;
            }

            .card-header {
                display: flex;
                justify-content: center;
            }

            .card-avatar > img{
                width: 12rem;
                padding: 1rem;
            }

            .card-close {
                position: absolute;

                background-color: lightskyblue;
                border: solid black;
                border-radius: 40%;
                border-width: 1px;

                font-size: large;
            }

            .card-info {
                padding-top: 2.5rem;

                
            }

            .card-info > div {
                display: flex;
            }
            .card-info > div > div > img {
                width: 3rem;
            }

            .card-footer > div{
                font-weight: bold;
                display: flex;
                justify-content: center;
                font-size:3rem;
            }
            .card-footer>div+div{
                padding-top: 0.5rem;
                font-size: large;
            }
        </style>
    </head>

    <body style="background-color: darkgrey">
        <div class="card">
            <button class="card-close">X</button>
            <div class="card-header">
                <div class="card-avatar">
                    <img src="avatar.png" alt="Mock avatar" />
                </div>
                <div class="card-info">
                    <div>
                        <div>
                            <img src="education.png" alt="Education" />
                        </div>
                        <div>MSc</div>
                    </div>
                    <div>
                        <div>
                            <img src="pin.png" alt="Location" />
                        </div>
                        <div>Zagreb, Croatia</div>
                    </div>
                    <div>
                        <div>
                            <img src="online.png" alt="Online" />
                        </div>
                        <div>Online</div>
                    </div>
                </div>
            </div>
            <div class="card-footer">
                <div>Ivana Ivić</div>
                <div>Web developer</div>
            </div>
            <div class="card-actions">
                <button>Add friend</button>
                <button>Send mail</button>
            </div>
        </div>
    </body>
</html>
